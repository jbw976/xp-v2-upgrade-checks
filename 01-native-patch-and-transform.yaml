# Triggers the "native-patch-and-transform" check across all three sub-cases:
# unset spec.mode (defaults to Resources), populated spec.resources, and
# populated spec.patchSets.
---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xnativepnts.upgradetest.crossplane.io
spec:
  group: upgradetest.crossplane.io
  names:
    kind: XNativePnt
    plural: xnativepnts
  claimNames:
    kind: NativePnt
    plural: nativepnts
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: nativepnt-composition
spec:
  compositeTypeRef:
    apiVersion: upgradetest.crossplane.io/v1alpha1
    kind: XNativePnt
  patchSets:
    - name: common
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.name
          toFieldPath: metadata.labels[upgradetest.crossplane.io/name]
  resources:
    - name: nop
      base:
        apiVersion: nop.crossplane.io/v1alpha1
        kind: NopResource
        spec:
          forProvider:
            conditionAfter:
              - conditionType: Ready
                conditionStatus: "True"
                time: "5s"
      patches:
        - type: PatchSet
          patchSetName: common
