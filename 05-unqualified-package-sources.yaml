# Triggers the "unqualified-package-source" check via a Provider and a
# Function whose spec.package omits the xpkg.crossplane.io registry prefix.
#
# Configuration is intentionally skipped: crossplane-contrib publishes only
# configuration-quickstart and it has no tagged releases. The check applies
# the same hostname logic uniformly across all three package kinds, so
# Provider + Function is enough to cover it.
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: unqualified-provider
spec:
  package: crossplane-contrib/provider-kubernetes:v1.2.1
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: unqualified-function
spec:
  package: crossplane-contrib/function-auto-ready:v0.6.4
