# Triggers the "external-secret-stores" check via a StoreConfig, a
# Composition with publishConnectionDetailsWithStoreConfigRef, and composed
# MRs with spec.publishConnectionDetailsTo.
#
# Also includes a negative case (mr-writesecret-only): an MR with only
# writeConnectionSecretToRef set, which must NOT be flagged.
#
# The Composition uses mode: Resources, so the native-patch-and-transform
# check will also fire here — that's correct, it genuinely uses both.
#
# Expected post-apply state: MRs with publishConnectionDetailsTo stay
# Synced=False with "feature is not enabled" because provider-nop never
# enables the ESS feature gate in its runtime. They still reach Ready=True,
# and the checker reads spec not status, so this is fine.
---
apiVersion: secrets.crossplane.io/v1alpha1
kind: StoreConfig
metadata:
  name: test-storeconfig
spec:
  type: Kubernetes
  defaultScope: crossplane-system
---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xextsecretstores.upgradetest.crossplane.io
spec:
  group: upgradetest.crossplane.io
  names:
    kind: XExtSecretStore
    plural: xextsecretstores
  claimNames:
    kind: ExtSecretStore
    plural: extsecretstores
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: extsecretstore-composition
spec:
  compositeTypeRef:
    apiVersion: upgradetest.crossplane.io/v1alpha1
    kind: XExtSecretStore
  publishConnectionDetailsWithStoreConfigRef:
    name: test-storeconfig
  resources:
    # configRef is unset here; the NopResource CRD default ({name: default})
    # fills it in at the apiserver, so the materialized MR still has it.
    - name: mr-default-ess
      base:
        apiVersion: nop.crossplane.io/v1alpha1
        kind: NopResource
        spec:
          forProvider:
            conditionAfter:
              - conditionType: Ready
                conditionStatus: "True"
                time: "5s"
          publishConnectionDetailsTo:
            name: ess-mr-default-storeconfig-secret
    - name: mr-custom-ess
      base:
        apiVersion: nop.crossplane.io/v1alpha1
        kind: NopResource
        spec:
          forProvider:
            conditionAfter:
              - conditionType: Ready
                conditionStatus: "True"
                time: "5s"
          publishConnectionDetailsTo:
            name: ess-mr-custom-storeconfig-secret
            configRef:
              name: test-storeconfig
    # Negative case: only writeConnectionSecretToRef, no
    # publishConnectionDetailsTo. The Secret name is patched from the
    # composite UID so the direct XR and the Claim-derived XR don't race
    # to own the same Secret.
    - name: mr-writesecret-only
      base:
        apiVersion: nop.crossplane.io/v1alpha1
        kind: NopResource
        spec:
          forProvider:
            conditionAfter:
              - conditionType: Ready
                conditionStatus: "True"
                time: "5s"
          writeConnectionSecretToRef:
            namespace: crossplane-system
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.uid
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "ess-mr-writesecret-only-%s"
---
apiVersion: upgradetest.crossplane.io/v1alpha1
kind: XExtSecretStore
metadata:
  name: extsecretstore-xr
spec:
  compositionRef:
    name: extsecretstore-composition
  publishConnectionDetailsTo:
    name: extsecretstore-xr-secret
    configRef:
      name: test-storeconfig
---
apiVersion: upgradetest.crossplane.io/v1alpha1
kind: ExtSecretStore
metadata:
  name: extsecretstore-claim
  namespace: default
spec:
  compositionRef:
    name: extsecretstore-composition
  publishConnectionDetailsTo:
    name: extsecretstore-claim-secret
    configRef:
      name: test-storeconfig
