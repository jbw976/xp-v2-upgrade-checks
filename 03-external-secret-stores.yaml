# Test: external secret stores.
#
# Triggers the "external-secret-stores" check via:
#   - A StoreConfig CR
#   - A Composition with spec.publishConnectionDetailsWithStoreConfigRef
#   - An XR (cluster-scoped) with spec.publishConnectionDetailsTo
#   - A Claim (namespaced) with spec.publishConnectionDetailsTo
#
# Note: the Composition uses mode: Resources, so it will also be flagged by
# the native-patch-and-transform check. That's correct — the Composition is
# genuinely using both deprecated patterns.
---
apiVersion: secrets.crossplane.io/v1alpha1
kind: StoreConfig
metadata:
  name: test-storeconfig
spec:
  type: Kubernetes
  defaultScope: crossplane-system
---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xextsecretstores.upgradetest.crossplane.io
spec:
  group: upgradetest.crossplane.io
  names:
    kind: XExtSecretStore
    plural: xextsecretstores
  claimNames:
    kind: ExtSecretStore
    plural: extsecretstores
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    name:
                      type: string
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: extsecretstore-composition
spec:
  compositeTypeRef:
    apiVersion: upgradetest.crossplane.io/v1alpha1
    kind: XExtSecretStore
  publishConnectionDetailsWithStoreConfigRef:
    name: test-storeconfig
  resources:
    - name: nop
      base:
        apiVersion: nop.crossplane.io/v1alpha1
        kind: NopResource
        spec:
          forProvider:
            conditionAfter:
              - conditionType: Ready
                conditionStatus: "True"
                time: "5s"
---
apiVersion: upgradetest.crossplane.io/v1alpha1
kind: XExtSecretStore
metadata:
  name: extsecretstore-xr
spec:
  compositionRef:
    name: extsecretstore-composition
  publishConnectionDetailsTo:
    name: extsecretstore-xr-secret
    configRef:
      name: test-storeconfig
---
apiVersion: upgradetest.crossplane.io/v1alpha1
kind: ExtSecretStore
metadata:
  name: extsecretstore-claim
  namespace: default
spec:
  compositionRef:
    name: extsecretstore-composition
  publishConnectionDetailsTo:
    name: extsecretstore-claim-secret
    configRef:
      name: test-storeconfig
