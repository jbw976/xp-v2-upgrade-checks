# Triggers the "controller-config" check via a ControllerConfig referenced
# from both a Provider and a Function (the two code paths the check covers).
# Package install status doesn't matter — the checker only reads spec.
---
apiVersion: pkg.crossplane.io/v1alpha1
kind: ControllerConfig
metadata:
  name: test-controllerconfig
spec:
  replicas: 1
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-with-controllerconfig
spec:
  package: xpkg.crossplane.io/crossplane-contrib/provider-helm:v1.2.0
  controllerConfigRef:
    name: test-controllerconfig
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-with-controllerconfig
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.10.4
  controllerConfigRef:
    name: test-controllerconfig
